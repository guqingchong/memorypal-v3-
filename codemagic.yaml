workflows:
  android-release:
    name: Android APK Build
    instance_type: mac_mini_m1
    max_build_duration: 60  # 增加构建时间（原生编译需要更久）
    environment:
      flutter: stable
      xcode: latest
      android_signing:
        - keystore_reference
    cache:
      cache_paths:
        - ~/.pub-cache
        - $CM_BUILD_DIR/android/.gradle
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Download Whisper model
        script: |
          # 下载 Whisper 模型文件
          mkdir -p whisper.cpp
          curl -L -o whisper.cpp/ggml-small-q5_1.bin \
            "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small-q5_1.bin"
          ls -lh whisper.cpp/

      - name: Build APK
        script: flutter build apk --release --split-per-abi

    artifacts:
      - build/app/outputs/flutter-apk/*
